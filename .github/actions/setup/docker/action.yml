name: "Docker"
description: "setup docker"

runs:
    using: "composite"
    steps:
        - if: runner.os == 'Windows'
          uses: Vampire/setup-wsl@v5
          with:
              distribution: Ubuntu-22.04
              wsl-conf: |
                  [wsl2]
                  networkingMode=mirrored

        - if: runner.os == 'Windows'
          name: Install Docker on WSL
          shell: wsl-bash {0}
          run: |
              curl -fsSL https://get.docker.com | sudo sh
              sudo service docker start

        - if: runner.os == 'Linux'
          name: Install Docker Compose
          shell: bash
          run: curl -fsSL https://get.docker.com | sudo sh

        - if: runner.os == 'macOS'
          name: Install Docker on MacOS
          shell: bash
          run: |
            brew update
            brew install docker qemu lima
            LIMACTL_PATH=$(brew --prefix)/bin/limactl
            COLIMA_PATH=$(brew --prefix)/bin/colima
            sudo curl -LO https://github.com/abiosoft/colima/releases/download/v0.8.1/colima-Darwin-arm64
            sudo install colima-Darwin-arm64 $COLIMA_PATH && sudo chmod +x $COLIMA_PATH
            sudo curl -L -o $LIMACTL_PATH https://github.com/mikekazakov/lima-nohvf/raw/master/limactl && sudo chmod +x $LIMACTL_PATH
            colima start --network-address --arch arm64 --vm-type=qemu
            docker --version
