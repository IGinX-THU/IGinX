# 默认 Relational META 配置（以 PostgreSQL 为基准）
# 始终先加载本文件作基线，再加载 engine 专属 xxx-meta.properties 覆盖差异项，
# 从而减少 mysql/oceanbase/postgresql 等各 engine 的配置量（仅需写与默认不同的部分）

# 驱动类（PostgreSQL）
driver_class=org.postgresql.Driver
# 默认数据库
default_database=postgres
# 系统数据库，用于过滤
system_databases=template0,template1,readme_to_recover
# 用于包裹表名和字段名的引号
quote="
# 删除数据库的SQL语句
drop_database_statement=DROP DATABASE IF EXISTS %s WITH (FORCE);
# 创建数据库的SQL语句
create_database_statement=CREATE DATABASE %s;
# 创建表
create_table_statement=CREATE TABLE %s (%s %s NOT NULL, %s, PRIMARY KEY(%s));
# 删除表
drop_table_statement=DROP TABLE IF EXISTS %s;
# 增加表字段
alter_table_add_column_statement=ALTER TABLE %s ADD %s %s;
# 删除表字段
alter_table_drop_column_statement=ALTER TABLE %s DROP COLUMN %s;
# 查询表
query_table_statement = SELECT %s, %s FROM %s %s ORDER BY %s;
# 查询表（无主键）
query_table_without_key_statement = SELECT %s FROM %s %s ORDER BY %s;
# 插入表数据
insert_table_statement = INSERT INTO %s ( %s ) VALUES ( %s )
# 更新表数据
update_table_statement = UPDATE %s SET %s WHERE %s = %s
# 删除表数据
delete_table_statement = UPDATE %s SET %s = null WHERE (%s >= %d AND %s < %d);
# 在JDBC使用getTables时是否需要加引号
jdbc_need_quote=false
# upsert语句中间部分
upsert_statement= ON CONFLICT ("RELATIONAL+KEY") DO UPDATE SET 
# upsert语句后面部分格式
upsert_conflict_statement=%s = EXCLUDED.%s
# 获取数据库列表的SQL语句
database_query_sql=SELECT datname FROM pg_database;
# 是否支持full join
is_support_full_join=true
# filter中正则匹配的符号
regex_like_expression=%s ~ %s
# filter中不匹配正则表达式的符号
not_regex_like_expression=%s !~ %s
# jdbc元数据获取是否支持特殊字符识别
jdbc_support_special_char=true
# pg中public部分为非元数据（真实数据）部分
schema_pattern=public
# 是否支持 SQL2003 规定的 information_schema 视图
support_boundary_query=true
# baseExpression和其他Expression的avg函数表达式
avg_cast_expression_base=%s(%s)
avg_cast_expression_default=%s(%s)
# 查询元数据边界时，是否需要针对不同的数据库建立独立的连接
boundary_query_use_db_connection=true
# 查询元数据边界的table_catalog字段名和table_schema字段名
boundary_query_catalog_column=table_catalog
boundary_query_schema_column=table_schema
# 单表最大列数
max_column_num_limit=1550
# 单行最大字节数
max_single_row_size_limit=8100
# 是否支持创建数据库
support_create_database=true
# 是否支持布尔类型
support_boolean_type=true
# jdbc是否支持从ResultSet获取表名
jdbc_support_get_table_name_from_result_set=true
# 控制不同jdbc原生方法Path匹配反斜杠行为
jdbc_strict_path_escape=false
# 能够创建SCHEMA的权限
database_create_privileges=
# 查看用户权限
query_user_privilege_statement=
# dummy时使用，默认与 database_query_sql 相同
dummy_database_query_sql=SELECT datname FROM pg_database;

# DataTypeTransformer（以 PostgreSQL 为基准）
# 数据库类型 -> IGinX 类型
BOOL=IGinX-BOOLEAN
INT=IGinX-INTEGER
INT2=IGinX-INTEGER
INT4=IGinX-INTEGER
SERIAL2=IGinX-INTEGER
SERIAL4=IGinX-INTEGER
INT8=IGinX-LONG
SERIAL8=IGinX-LONG
FLOAT4=IGinX-FLOAT
DECIMAL=IGinX-DOUBLE
FLOAT8=IGinX-DOUBLE
NUMERIC=IGinX-DOUBLE

# IGinX 类型 -> 数据库类型（PostgreSQL）
IGinX-INTEGER=INTEGER
IGinX-FLOAT=REAL
IGinX-DOUBLE=DOUBLE PRECISION
IGinX-BOOLEAN=BOOLEAN
IGinX-BINARY=TEXT
IGinX-LONG=BIGINT

# 每种数据类型的大小
IGinX-INTEGER.size=4
IGinX-FLOAT.size=4
IGinX-DOUBLE.size=8
IGinX-BOOLEAN.size=1
IGinX-BINARY.size=18
IGinX-LONG.size=8
