# MySQL 配置（仅覆盖与 default-meta.properties 不同的项）

# 驱动类
driver_class=com.mysql.cj.jdbc.Driver
# 默认数据库
default_database=mysql
# 系统数据库，用于过滤
system_databases=performance_schema,information_schema,sys
# 用于包裹表名和字段名的引号
quote=`
# 删除数据库的SQL语句（无 WITH (FORCE)）
drop_database_statement=DROP DATABASE IF EXISTS %s;
# 在JDBC使用getTables时是否需要加引号
jdbc_need_quote=true
# upsert语句中间部分
upsert_statement= ON DUPLICATE KEY UPDATE 
# upsert语句后面部分格式
upsert_conflict_statement= %s = VALUES(%s)
# 获取数据库列表的SQL语句
database_query_sql=SELECT SCHEMA_NAME AS datname FROM information_schema.schemata;
# 虚拟数据库查询SQL
dummy_database_query_sql=SELECT SCHEMA_NAME AS datname FROM information_schema.schemata;
# 是否支持full join
is_support_full_join=false
# filter中正则匹配的符号
regex_like_expression=%s REGEXP %s
# filter中不匹配正则表达式的符号
not_regex_like_expression=%s NOT REGEXP %s
# pg中public部分为非元数据（真实数据）部分（MySQL不需要，设为空覆盖默认值）
schema_pattern=
# baseExpression和其他Expression的avg函数表达式
avg_cast_expression_base=%s(CAST(%s AS DECIMAL(34, 16)))
# 查询元数据边界时，是否需要针对不同的数据库建立独立的连接
boundary_query_use_db_connection=false
# 查询元数据边界的table_catalog字段名和table_schema字段名
boundary_query_catalog_column=table_schema
boundary_query_schema_column=table_schema
# 单表最大列数
max_column_num_limit=1015
# 单行最大字节数
max_single_row_size_limit=7900

# DataTypeTransformer（仅覆盖与 default-meta 不同的类型映射）
TINYINT=IGinX-BOOLEAN
SMALLINT=IGinX-INTEGER
MEDIUMINT=IGinX-INTEGER
BIGINT=IGinX-LONG
INTEGER=IGinX-INTEGER
FLOAT=IGinX-FLOAT
DOUBLE=IGinX-DOUBLE
DECIMAL=IGinX-DOUBLE

IGinX-INTEGER=INTEGER
IGinX-FLOAT=FLOAT(12,6)
IGinX-DOUBLE=DOUBLE(22,11)
IGinX-BOOLEAN=TINYINT
IGinX-BINARY=VARCHAR(3000)
IGinX-LONG=BIGINT

# 每种数据类型的大小
IGinX-BINARY.size=1450
