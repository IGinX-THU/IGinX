# 达梦数据库特定配置（覆盖default-meta.properties中的默认值）

# 驱动类
driver_class=dm.jdbc.driver.DmDriver
# 默认数据库
default_database=SYSDBA
# 系统数据库，用于过滤
system_databases=SYS,CTISYS,SYSAUDITOR,SYSSSO
# 能够创建SCHEMA的权限
database_create_privileges=RESOURCE,DBA,CREATE SCHEMA
# 是否支持创建数据库
support_create_database=false
# 创建数据库的SQL语句（达梦使用SCHEMA）
create_database_statement=CREATE SCHEMA %s;
# 删除数据库的SQL语句（达梦使用SCHEMA）
drop_database_statement=DROP SCHEMA %s CASCADE;
# 查看用户权限
query_user_privilege_statement=SELECT * FROM SESSION_PRIVS;
# 创建表（达梦使用IF NOT EXISTS）
create_table_statement=CREATE TABLE IF NOT EXISTS %s (%s %s NOT NULL, %s, PRIMARY KEY(%s))
# 删除表
drop_table_statement=DROP TABLE IF EXISTS %s
# 增加表字段（达梦语法不同）
alter_table_add_column_statement=ALTER TABLE %s ADD (%s %s)
# 删除表字段
alter_table_drop_column_statement=ALTER TABLE %s DROP COLUMN %s
# 查询表数据（达梦不需要分号）
query_table_statement = SELECT %s, %s FROM %s %s ORDER BY %s
# 查询表数据（无主键，达梦不需要分号）
query_table_without_key_statement = SELECT %s FROM %s %s ORDER BY %s
# 插入表数据
insert_table_statement = INSERT INTO %s ( %s ) VALUES ( %s )
# 更新表数据
update_table_statement = UPDATE %s SET %s WHERE %s = %s
# 删除表数据（达梦使用NULL而不是null）
delete_table_statement = UPDATE %s SET %s = NULL WHERE (%s >= %d AND %s < %d)
# upsert语句中间部分（达梦使用MERGE语法）
upsert_statement = WHEN MATCHED THEN UPDATE SET
# upsert语句后面部分格式（达梦语法不同）
upsert_conflict_statement= %s.%s = source.%s
# 获取数据库列表的SQL语句
database_query_sql=SELECT DISTINCT SUBSTR(table_name, 1, INSTR(table_name, '.') - 1) AS DATNAME FROM user_tables WHERE table_name LIKE 'unit%.%'
# 虚拟数据库查询SQL
dummy_database_query_sql=SELECT DISTINCT owner AS DATNAME FROM all_tables
# filter中正则匹配的符号（达梦使用REGEXP_LIKE函数）
regex_like_expression=REGEXP_LIKE(%s,%s)
# filter中不匹配正则表达式的符号
not_regex_like_expression=NOT REGEXP_LIKE(%s,%s)
# 是否支持布尔类型
support_boolean_type=false
# jdbc元数据获取是否支持特殊字符识别
jdbc_support_special_char=false
# baseExpression和其他Expression的avg函数表达式
avg_cast_expression_base=%s(CAST(%s AS DECIMAL(34, 16)))
# 单表最大列数
max_column_num_limit=2000
# 单行最大字节数
max_single_row_size_limit=8100
# pg中public部分为非元数据（真实数据）部分（达梦不需要）
schema_pattern=
# 查询元数据边界的table_catalog字段名和table_schema字段名（达梦不需要）
boundary_query_catalog_column=
boundary_query_schema_column=
# 查询元数据边界时，是否需要针对不同的数据库建立独立的连接（达梦不需要）
boundary_query_use_db_connection=false

# 达梦数据库 DataTypeTransformer (只覆盖与默认配置不同的项)
# 数据库类型 2 IGinX 类型（达梦特有的类型映射）
BYTE=IGINX-BOOLEAN
INT=IGinX-INTEGER
NUMERIC=IGinX-INTEGER
REAL=IGinX-FLOAT
DOUBLE\ PRECISION=IGinX-DOUBLE
BIG\ DECIMAL=IGinX-DOUBLE
DECIMAL=IGinX-DOUBLE

# IGinX 类型 2 数据库类型（达梦特有的类型定义）
IGinX-FLOAT=REAL
IGinX-DOUBLE=DOUBLE
IGinX-BOOLEAN=TINYINT
IGinX-BINARY=VARCHAR2(4000)

# 每种数据类型的大小（达梦加1用来表示列头，所有大小都不同）
IGinX-INTEGER.size=5
IGinX-FLOAT.size=5
IGinX-DOUBLE.size=9
IGinX-BOOLEAN.size=2
IGinX-BINARY.size=1100
IGinX-LONG.size=9
